[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  # Override in Netlify UI → Site settings → Environment variables if needed:
  VITE_FRONTEND_ONLY = "false"
  VITE_ENABLE_DEMO_LOGIN = "false"
  VITE_API_BASE_URL = "https://sriramias-backend.onrender.com"
  VITE_BOOKSTORE_USE_MOCK = "false"

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
